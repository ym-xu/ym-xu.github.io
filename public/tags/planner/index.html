    <script>

(function() {
  const key = 'prefers-color-scheme';
  const btn = document.getElementById('theme-toggle');
  const root = document.documentElement;
  function applyTheme(t){ root.setAttribute('data-theme', t); }
  function current(){ return localStorage.getItem(key) || 'auto'; }
  function init(){
    const t = current();
    if (t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) applyTheme('dark');
    if (btn) btn.addEventListener('click', () => {
      const now = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(now); localStorage.setItem(key, now);
    });
  }
  document.addEventListener('DOMContentLoaded', init);
})();
</script>


<script>
(function(){
  document.addEventListener('click', function(e){
    var btn = e.target.closest('.code-copy');
    if (!btn) return;
    var card = btn.closest('.code-card');
    var pre = card && card.querySelector('pre');
    if (!pre) return;
    navigator.clipboard.writeText(pre.innerText).then(function(){
      var old = btn.textContent;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = old; btn.classList.remove('copied'); }, 1500);
    });
  });
})();
</script>
