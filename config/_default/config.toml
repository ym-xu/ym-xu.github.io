baseURL = "https://ym-xu.github.io/"
title = "Yiming Xu"
languageCode = "en"
theme = "mu-min"
[pagination]
  pagerSize = 10
enableRobotsTXT = true

[permalinks]
  posts = "/posts/:year/:month/:slug/"

[taxonomies]
  tag = "tags"
  series = "series"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    tabWidth = 2
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Optional: suppress the warning if desired
ignoreLogs = ['warning-goldmark-raw-html']

[params]
  description = "A clean and fast content website"
  showReadingTime = true
  enableDarkMode = true
  showToc = true
  plausibleDomain = ""

[params.author]
  name = "Yiming Xu"

# --- Home hero (phase 2) ---
[params.home]
  role = "PhD Fellow, Multimodal Document Understanding"
  avatar = "/avatar.jpg"   # drop your photo at static/avatar.jpg (already included in this package)
  # Email kept in two parts so the literal address is never a contiguous string
  # in the HTML; assembled client-side on click.
  emailUser = "yiming"
  emailDomain = "cvc.uab.cat"
  cvUrl = "/cv.pdf"   # TODO: drop your CV PDF at static/cv.pdf (or change this path)
  [params.home.social]
    linkedin = "https://www.linkedin.com/in/yiming-xu-86371b201/"
    github = "https://github.com/ym-xu"
    scholar = "https://scholar.google.com/citations?user=n1skXDsAAAAJ&hl=en"
    twitter = "https://x.com/Yiming_xu_1104"

[params.giscus]
  repo = ""
  repo_id = ""
  category = "General"
  category_id = ""
  mapping = "pathname"
  reactions_enabled = "1"
  emit_metadata = "0"
  input_position = "bottom"
  theme = "light"
  lang = "en"

[privacy]
  [privacy.youtube]
    privacyEnhanced = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 5
  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 10
  [[menu.main]]
    name = "Publications"
    url = "/publications/"
    weight = 20
  [[menu.main]]
    name = "Writing"
    url = "/posts/"
    weight = 30
